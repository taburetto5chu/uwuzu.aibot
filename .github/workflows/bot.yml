name: uwuzu Bot Runner

on:
  workflow_dispatch: # 手動実行用
  # Cron-job.orgからのトリガーを受け付ける設定

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Node.js 24への強制移行に対応した最新のアクションを使用
      - name: Checkout Repository
        uses: actions/checkout@v4 # v4の内部も順次更新されています

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # 2026年時点で安定しているバージョン

      # ここがポイント：GitHubランナーにNode.js 24の使用を明示的に許可する（警告対策）
      - name: Set Node.js version environment
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai requests # 必要なライブラリ

      - name: Run Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          UWUZU_TOKEN: ${{ secrets.UWUZU_TOKEN }}
        run: python bot.py
