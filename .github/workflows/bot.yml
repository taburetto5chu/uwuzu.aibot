name: Uwuzu Bot Dispatch
on:
  repository_dispatch:
    types: [trigger-bot] # 「外部からの合図」の名前を定義

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests google-generativeai

      - name: Run Bot
        env:
          UWUZU_DOMAIN: ${{ secrets.UWUZU_DOMAIN }}
          UWUZU_TOKEN: ${{ secrets.UWUZU_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
