name: Uwuzu Bot

on:
  # 手動で実行するためのボタンを出す設定
  workflow_dispatch:
  
  # Cron-job.org などの外部から合図を受け取るための設定
  repository_dispatch:
    types: [execute-bot]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run Bot Script
        env:
          # GitHub Secretsに登録した名前と一致させてください
          UWUZU_TOKEN: ${{ secrets.UWUZU_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # あなたのサーバーのドメイン（例: dev.uwuzu.net）
          UWUZU_DOMAIN: "あなたのサーバー名" 
        run: python bot.py
