name: Uwuzu Bot

on:
  # Cron-job.org からの合図（repository_dispatch）
  repository_dispatch:
    types: [execute-bot]
  # GitHub上での手動実行
  workflow_dispatch:

env:
  # Node.js 20 の非推奨警告対策
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. コードの取得
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python 環境のセットアップ
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. ライブラリのインストール
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. Bot プログラムの実行
      - name: Run Bot
        env:
          # GitHub Secrets の名前とプログラム内での名前を完全に一致させる
          UWUZU_TOKEN: ${{ secrets.UWUZU_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          UWUZU_SERVER_URL: ${{ secrets.UWUZU_SERVER_URL }}
        run: python bot.py
