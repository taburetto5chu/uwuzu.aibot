name: Uwuzu Bot

on:
  workflow_dispatch:
  repository_dispatch:
    types: [execute-bot]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          # キャッシュを有効にする（実行を速くします）
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Bot Script
        env:
          UWUZU_TOKEN: ${{ secrets.UWUZU_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # 直接書くか、Secretsに登録して呼び出してください
          UWUZU_DOMAIN: ${{ secrets.UWUZU_DOMAIN }}
        run: python bot.py
